apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatqna.fullname" . }}
  labels:
    {{- include "chatqna.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: chatqna
  selector:
    {{- include "chatqna.selectorLabels" . | nindent 4 }}
---
kind: Service
apiVersion: v1
metadata:
  name: chaqna-ui
spec:
  type: NodePort
  selector:
    app: chaqna-ui
  ports:
    - name: service
      port: 5173
      targetPort: 5173
      nodePort: 30173
