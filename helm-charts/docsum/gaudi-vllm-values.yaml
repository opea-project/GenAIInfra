# Accelerate inferencing in heaviest components to improve performance
# by overriding their subchart values

tgi:
  enabled: false

vllm:
  enabled: true
  image:
    repository: opea/vllm-gaudi
    tag: "latest"
  resources:
    limits:
      habana.ai/gaudi: 1
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 120
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 1
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 1

llm-uservice:
  image:
    repository: opea/llm-docsum-vllm
    tag: "latest"
